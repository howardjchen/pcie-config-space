<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>PCIe Configuration Space Viewer</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #222;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ---------- TOP: structures list ---------- */
    .top-list {
      flex: 0 0 40%;
      border-bottom: 1px solid #ccc;
      overflow-y: auto;
      background: #f8fafc;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      position: sticky;
      top: 0;
      background: #e2edf7;
      z-index: 1;
    }

    th,
    td {
      padding: 6px 8px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
    }

    tr.struct-row {
      cursor: pointer;
    }

    tr.struct-row:nth-child(even) td {
      background: #f9fcff;
    }

    tr.struct-row.selected td {
      background: #d1e3ff;
    }

    .id-col {
      width: 80px;
    }

    .type-col {
      width: 70px;
    }

    /* ---------- BOTTOM: bitfield + bit detail ---------- */
    .bottom {
      flex: 1 1 auto;
      display: flex;
      min-height: 0;
    }

    .bottom-left,
    .bottom-right {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .bottom-left {
      border-right: 1px solid #e5e7eb;
      background: #fafafa;
    }

    .section-title {
      font-weight: 600;
      margin: 0 0 6px;
      font-size: 14px;
    }

    /* bitfield “map” (Bottom-Left) - Flexbox Layout */
    .struct-container {
      display: flex;
      flex-direction: column;
      background: #fff;
      font-size: 11px;
      border: 1px solid #ccc;
    }

    .struct-row-flex {
      display: flex;
      border-bottom: 1px solid #ccc;
      height: 24px;
      /* Fixed height for consistency */
    }

    .struct-row-flex:last-child {
      border-bottom: none;
    }

    .struct-content-flex {
      flex: 1;
      /* Takes remaining space */
      display: flex;
    }

    .struct-field-flex {
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1px solid #7f7f7f;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      cursor: pointer;
      background: #fff;
      padding: 0 4px;
    }

    .struct-field-flex:last-child {
      border-right: none;
      /* Last field in content area doesn't need right border */
    }

    .struct-field-flex:hover {
      background: #e0f2fe;
    }

    .struct-field-flex.selected {
      background: #a3d3a3;
      border-color: #555;
    }

    .struct-offset-flex {
      width: 40px;
      /* Fixed width */
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f0f0;
      border-left: 1px solid #ccc;
      font-weight: bold;
      color: #333;
      flex-shrink: 0;
      /* Prevent shrinking */
    }

    /* bit detail (Bottom-Right) */
    .detail-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 10px;
      border-bottom: 1px solid #eee;
      padding-bottom: 5px;
    }

    .detail-title {
      font-size: 16px;
      font-weight: bold;
    }

    .detail-subtitle {
      font-size: 14px;
      color: #666;
    }

    /* Visual Bit Bar */
    .bit-bar-container {
      margin-bottom: 15px;
      font-family: monospace;
      font-size: 10px;
    }

    .bit-numbers {
      display: flex;
      justify-content: space-between;
      margin-bottom: 2px;
      padding: 0 2px;
      color: #555;
    }

    .bit-bar {
      display: flex;
      border: 1px solid #999;
      height: 14px;
    }

    .bit-box {
      flex: 1;
      border-right: 1px solid #ccc;
      background: #eee;
      /* Default/Reserved */
    }

    .bit-box:last-child {
      border-right: none;
    }

    .bit-box.active {
      background: #fff;
      /* Defined bits */
    }

    /* Description List */
    .bit-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .bit-list-item {
      margin-bottom: 12px;
    }

    .bit-list-title {
      font-size: 12px;
      font-weight: bold;
      color: #000;
    }

    .bit-list-desc {
      font-size: 12px;
      color: #333;
      margin-left: 15px;
      margin-top: 2px;
      line-height: 1.4;
    }

    .bit-values-table {
      margin-top: 4px;
      margin-left: 15px;
      border-collapse: collapse;
      font-size: 11px;
      width: auto;
    }

    .bit-values-table td {
      border: none;
      padding: 1px 6px 1px 0;
      vertical-align: top;
      color: #555;
      background: transparent !important;
      /* Override default table striping if any */
    }

    .bit-value-cell {
      font-family: monospace;
      font-weight: bold;
      color: #444;
      min-width: 20px;
    }

    .bit-meaning-cell {
      color: #666;
    }

    /* simple top bar for future: config dump input等可以放這 */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 8px;
      border-bottom: 1px solid #e5e7eb;
      background: #f3f4f6;
      font-size: 12px;
    }

    /* Splitters */
    .splitter-horizontal {
      height: 6px;
      background: #e5e7eb;
      cursor: row-resize;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .splitter-horizontal::after {
      content: "";
      width: 30px;
      height: 2px;
      background: #bbb;
      border-radius: 1px;
    }

    .splitter-horizontal:hover,
    .splitter-horizontal.active {
      background: #d1d5db;
    }

    .splitter-vertical {
      width: 6px;
      background: #e5e7eb;
      cursor: col-resize;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .splitter-vertical::after {
      content: "";
      height: 30px;
      width: 2px;
      background: #bbb;
      border-radius: 1px;
    }

    .splitter-vertical:hover,
    .splitter-vertical.active {
      background: #d1d5db;
    }
  </style>
</head>

<body>
  <div class="app">
    <!-- optional toolbar: config dump / search can be added here later -->
    <div class="toolbar">
      <div style="font-weight:600;">PCIe Config Space Viewer</div>
    </div>

    <!-- TOP: List of all Headers / Capabilities / Extended Capabilities -->
    <div class="top-list" id="top-pane">
      <table>
        <thead>
          <tr>
            <th class="id-col">ID</th>
            <th class="type-col">Type</th>
            <th>Name</th>
            <th>Description</th>
          </tr>
        </thead>
        <tbody id="structure-list-body">
          <!-- JS render -->
        </tbody>
      </table>
    </div>

    <!-- Horizontal Splitter -->
    <div class="splitter-horizontal" id="splitter-h"></div>

    <!-- BOTTOM: Left = bitfield diagram, Right = bit description -->
    <div class="bottom" id="bottom-pane">
      <div class="bottom-left">
        <div class="section-title" id="struct-title" style="background:#d1d5db; padding:4px; margin:0;">Structure</div>
        <!-- Removed subtitle to match image style closer, or keep it minimal -->
        <div class="struct-container" id="bitfield-container">
          <!-- JS render -->
        </div>
        <div class="placeholder" id="bitfield-placeholder" style="display:none; padding:8px;">
          No bitfield layout defined.
        </div>
      </div>

      <!-- Vertical Splitter -->
      <div class="splitter-vertical" id="splitter-v"></div>

      <div class="bottom-right" id="bottom-right-pane">
        <!-- Header -->
        <div class="detail-header">
          <div class="detail-title" id="field-title">Select a register</div>
          <div class="detail-subtitle" id="field-subtitle"></div>
        </div>

        <!-- Bit Bar -->
        <div class="bit-bar-container" id="bit-bar-container" style="display:none;">
          <div class="bit-numbers" id="bit-numbers"></div>
          <div class="bit-bar" id="bit-bar"></div>
        </div>

        <!-- Description List -->
        <ul class="bit-list" id="bit-list"></ul>

        <div class="placeholder" id="bits-placeholder" style="display:none;">
          No bit descriptions defined.
        </div>
      </div>
    </div>
  </div>

  <script>
    /**
     * Note:
     * - The structures here are just "templates + partial examples",

     *

     *       {
     *         offset: "00h",
     *         fields: [
     *           { id: "vendorid", label: "Vendor ID", range: "[15:0]" },
     *           ...
     *         ]
     *       },
     *       ...
     *     ],
     *     bitfields: {              // For bottom-right bit detailed description
     *       status: {
     *         name: "Status",
     *         offset: "06h",
     *         range: "[31:16]",
     *         bits: [
     *           { range: "[3]",  title: "Interrupt Status", description: "Placeholder text, please fill in according to the spec." },
     *           ...
     *         ]

     *       ...

     */

    function makeChapter7Bit(range, title, description, values) {
      const item = { range, title, description };
      if (values) item.values = values;
      return item;
    }
    
    function makeChapter7Reserved(range, behavior = "Needs Manual Verification") {
      return makeChapter7Bit(range, behavior, behavior === "RsvdP"
        ? "Reserved and preserved by software."
        : behavior === "RsvdZ"
          ? "Reserved; reads zero and software writes zero."
          : "Needs Manual Verification: the source-table Reserved/RsvdP/RsvdZ access behavior is not encoded here.");
    }
    
    function makeChapter7Flag(range, title, description) {
      return makeChapter7Bit(range, title, description, { "0": "Not set / disabled / inactive", "1": "Set / enabled / active" });
    }
    
    function chapter7FieldId(prefix, label) {
      return `${prefix}_${label.toLowerCase().replace(/[^a-z0-9]+/g, "_").replace(/^_|_$/g, "")}`;
    }
    
    function chapter7HeaderBits(isExtended) {
      return isExtended
        ? [
            makeChapter7Bit("[15:0]", "PCI Express Extended Capability ID", "Identifies the Extended Capability structure."),
            makeChapter7Bit("[19:16]", "Capability Version", "Version number for this Extended Capability structure."),
            makeChapter7Bit("[31:20]", "Next Capability Offset", "Offset to the next Extended Capability, or 000h when this is the final item.")
          ]
        : [
            makeChapter7Bit("[7:0]", "Capability ID", "Identifies the PCI-compatible Capability structure."),
            makeChapter7Bit("[15:8]", "Next Capability Pointer", "Pointer to the next capability, or 00h when this is the final item."),
            makeChapter7Reserved("[31:16]")
          ];
    }
    
    function chapter7WholeRegisterBits(range, label, description) {
      return [makeChapter7Bit(range, label, description)];

    function chapter7AerUncorrectableBits(kind) {
      const fields = [
        [0, "Undefined"], [4, "Data Link Protocol Error"], [5, "Surprise Down Error"],
        [12, "Poisoned TLP Received"], [13, "Flow Control Protocol Error"],
        [14, "Completion Timeout"], [15, "Completer Abort"], [16, "Unexpected Completion"],
        [17, "Receiver Overflow"], [18, "Malformed TLP"], [19, "ECRC Error"],
        [20, "Unsupported Request Error"], [21, "ACS Violation"],
        [22, "Uncorrectable Internal Error"], [23, "MC Blocked TLP"],
        [24, "AtomicOp Egress Blocked"], [25, "TLP Prefix Blocked Error"],
        [26, "Poisoned TLP Egress Blocked"], [27, "DMWr Request Egress Blocked"],
        [28, "IDE Check Failed"], [29, "Misrouted IDE TLP"],
        [30, "PCRC Check Failed"], [31, "TLP Translation Egress Blocked"]
      ];
      return fields.map(([bit, name]) => {
        if (name === "Undefined") {
          return makeChapter7Bit(`[${bit}]`, "Undefined", "Legacy undefined bit; software must ignore the value read.");
        }
        const suffix = kind === "Status" ? " Status" : ` ${kind}`;
        const description = kind === "Status"
          ? `Indicates that a ${name} condition was detected.`
          : kind === "Mask"
            ? `When Set, suppresses recording and reporting of ${name}.`
            : `Selects Fatal when Set and Non-Fatal when Clear for ${name}.`;
        return makeChapter7Bit(`[${bit}]`, `${name}${suffix}`, description);
      });
    }

    function chapter7AerCorrectableBits(kind) {
      const fields = [
        [0, "Receiver Error"], [6, "Bad TLP"], [7, "Bad DLLP"],

        [13, "Advisory Non-Fatal Error"], [14, "Corrected Internal Error"],

        `${name} ${kind}`,
        kind === "Status"
          ? `Indicates that a ${name} condition was detected.`
          : `When Set, suppresses reporting of ${name}.`
      ));

        const descDiv = document.createElement("div");
        descDiv.className = "bit-list-desc";
        descDiv.textContent = bit.description;
    
        li.append(titleDiv, descDiv);
    
        if (bit.values) {
          const valuesTable = document.createElement("table");
          valuesTable.className = "bit-values-table";
          for (const [val, meaning] of Object.entries(bit.values)) {
            const row = document.createElement("tr");
            const valCell = document.createElement("td");
            valCell.className = "bit-value-cell";
            valCell.textContent = Number(val).toString(2) + "b";
            const meanCell = document.createElement("td");
            meanCell.className = "bit-meaning-cell";
            meanCell.textContent = meaning;
            row.append(valCell, meanCell);
            valuesTable.appendChild(row);
          }
          li.appendChild(valuesTable);
        }
    
        bitList.appendChild(li);
      });
    }
    
    function renderBitBar(field) {
      bitNumbers.innerHTML = "";
      bitBar.innerHTML = "";
    
      const { high, low } = parseRange(field.range);
    
      // Create numbers row
      const numSpanHigh = document.createElement("span");
      numSpanHigh.textContent = high;
      const numSpanLow = document.createElement("span");
      numSpanLow.textContent = low;
    
      bitNumbers.append(numSpanHigh, numSpanLow);
    
      // Create bit boxes
      for (let b = high; b >= low; b--) {
        const box = document.createElement("div");
        box.className = "bit-box";
    
        // Check if this bit is defined in field.bits
        const bitDef = (field.bits || []).find(def => {
          const r = parseRange(def.range);
          return b <= r.high && b >= r.low;
        });
    
        if (bitDef) {
          // If defined, check if it is Reserved. 
          // If NOT Reserved, add .active (white). Reserved stays default (gray).
          box.classList.toggle("active", !/reserved|rsvd|manual verification/i.test(bitDef.title));
          box.title = `Bit ${b}: ${bitDef.title}`;
        } else {
          box.title = `Bit ${b}`;
        }
    
        bitBar.appendChild(box);
      }
    }
    
    
    function parseRange(rangeStr) {
      const match = rangeStr.match(/\[(\d+)(?::(\d+))?\]/);
      if (!match) return { high: 0, low: 0 };
      const high = parseInt(match[1], 10);
      const low = match[2] ? parseInt(match[2], 10) : high;
      return { high, low };
    }
    
    function updateAll() {
      renderStructureList();
      const struct = structures.find(s => s.id === currentStructureId);
      if (struct) {
        renderBitfieldMap(struct);
        renderBitDetails(struct);
      }
    }
    
    // Init
    updateAll();
  </script>
</body>

</html>
